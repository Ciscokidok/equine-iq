databases:
  - name: equine-iq-db
    databaseName: equineiq
    user: equineiq
    plan: free

services:
  - type: web
    name: equine-iq-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: equine-iq-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: equine-iq-frontend
          type: web
          property: url
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

  - type: web
    name: equine-iq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_API_URL
        fromService:
          name: equine-iq-api
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
